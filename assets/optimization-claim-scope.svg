<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Historical optimization claim-scope A/B comparison</title>
  <desc id="desc">A refined navy, parchment, and gold editorial infographic showing solver-status distributions for 40 matched synthetic MILP instances. The proposed method has 27 optimal, 8 feasible time-limit, and 5 no-incumbent outcomes; the baseline has 23, 12, and 5. Median runtime among proved-optimal runs is 71 versus 94 seconds. This is a one-run historical snapshot, not validation of the current skill.</desc>

  <defs>
    <linearGradient id="navyField" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111D33"/>
      <stop offset="0.58" stop-color="#091426"/>
      <stop offset="1" stop-color="#050D19"/>
    </linearGradient>
    <linearGradient id="paper" x1="110" y1="250" x2="1450" y2="830" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF7EA"/>
      <stop offset="1" stop-color="#EDE3CD"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E9D394"/>
      <stop offset="0.48" stop-color="#C9A75A"/>
      <stop offset="1" stop-color="#94702E"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#263550" stroke-width="1" opacity="0.36"/>
    </pattern>
    <pattern id="paperGrain" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="7" r="0.7" fill="#17243A" opacity="0.045"/>
      <circle cx="24" cy="22" r="0.55" fill="#8E6A2C" opacity="0.06"/>
    </pattern>
    <filter id="sheetShadow" x="-12%" y="-16%" width="124%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020712" flood-opacity="0.5"/>
    </filter>
    <style>
      .display { font-family: 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif; }
      .sans { font-family: 'Avenir Next', Avenir, 'Helvetica Neue', sans-serif; }
      .eyebrow { font-family: 'Avenir Next', Avenir, 'Helvetica Neue', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 3px; }
      .section { font-family: 'Avenir Next', Avenir, 'Helvetica Neue', sans-serif; font-size: 14px; font-weight: 750; letter-spacing: 2.6px; }
      .body { font-family: 'Avenir Next', Avenir, 'Helvetica Neue', sans-serif; font-size: 17px; }
      .barText { font-family: 'Avenir Next', Avenir, 'Helvetica Neue', sans-serif; font-size: 16px; font-weight: 750; font-variant-numeric: tabular-nums; }
      .tabular { font-variant-numeric: tabular-nums; }
    </style>
  </defs>

  <!-- Deep editorial field -->
  <rect width="1600" height="1000" fill="url(#navyField)"/>
  <rect width="1600" height="1000" fill="url(#grid)" opacity="0.42"/>
  <circle cx="1352" cy="142" r="236" stroke="#A88642" stroke-width="1" opacity="0.12"/>
  <circle cx="1352" cy="142" r="176" stroke="#A88642" stroke-width="1" opacity="0.1"/>
  <path d="M48 24V56M32 40H64M1536 24V56M1520 40H1552" stroke="#C8A75B" stroke-width="1.5" opacity="0.8"/>

  <!-- Masthead -->
  <text x="72" y="62" class="eyebrow" fill="#D1B66D">EVIDENCE REVIEW  /  HISTORICAL A·B FIXTURE</text>
  <text x="72" y="160" class="display" fill="#F6EFDD" font-size="76" font-weight="600" letter-spacing="-1.8">Optimization claim scope</text>
  <text x="76" y="206" class="sans" fill="#AFBACB" font-size="21" letter-spacing="0.35">What the evidence supports — and where the claim chain stops.</text>
  <path d="M76 232H1518" stroke="#7A6433" stroke-width="1"/>
  <path d="M76 232H480" stroke="url(#gold)" stroke-width="3"/>

  <!-- Historical evidence stamp -->
  <g transform="translate(1240 74) rotate(-2 140 60)">
    <rect width="282" height="116" fill="#0B1628" stroke="#9A493A" stroke-width="2"/>
    <rect x="8" y="8" width="266" height="100" stroke="#9A493A" stroke-width="1"/>
    <text x="141" y="37" text-anchor="middle" class="eyebrow" fill="#C97968" font-size="13">HISTORICAL SNAPSHOT</text>
    <text x="141" y="68" text-anchor="middle" class="display" fill="#F0D9CD" font-size="24" font-weight="600">One recorded run</text>
    <text x="141" y="92" text-anchor="middle" class="sans" fill="#C97968" font-size="12" font-weight="700" letter-spacing="1.4">NOT CURRENT VALIDATION</text>
  </g>

  <!-- Main parchment sheet -->
  <g filter="url(#sheetShadow)">
    <rect x="64" y="270" width="1472" height="560" fill="url(#paper)"/>
    <rect x="64" y="270" width="1472" height="560" fill="url(#paperGrain)"/>
  </g>
  <rect x="64" y="270" width="8" height="560" fill="url(#gold)"/>
  <path d="M1024 302V588" stroke="#C8B994" stroke-width="1.5"/>
  <path d="M96 612H1504" stroke="#C8B994" stroke-width="1.5"/>

  <!-- Section 01: distribution -->
  <text x="104" y="320" class="section" fill="#8C6B2C">01  /  SOLVER STATUS DISTRIBUTION</text>
  <text x="104" y="370" class="display" fill="#17243A" font-size="38" font-weight="700">Forty matched MILP instances</text>
  <text x="104" y="402" class="body" fill="#59677A">Same formulation, hardware, solver version, and 600 s wall-clock limit.</text>

  <text x="104" y="459" class="sans" fill="#17243A" font-size="16" font-weight="750" letter-spacing="1.2">PROPOSED</text>
  <text x="220" y="459" class="sans tabular" fill="#8C6B2C" font-size="13" font-weight="700">N = 40</text>
  <rect x="280" y="427" width="486" height="48" fill="#17243A"/>
  <rect x="766" y="427" width="144" height="48" fill="#B68C3D"/>
  <rect x="910" y="427" width="90" height="48" fill="#934437"/>
  <text x="298" y="458" class="barText" fill="#F7F0DE">27  OPTIMAL</text>
  <text x="782" y="458" class="barText" fill="#FFF7E4">8</text>
  <text x="927" y="458" class="barText" fill="#FFF0EA">5</text>

  <text x="104" y="531" class="sans" fill="#17243A" font-size="16" font-weight="750" letter-spacing="1.2">BASELINE</text>
  <text x="220" y="531" class="sans tabular" fill="#8C6B2C" font-size="13" font-weight="700">N = 40</text>
  <rect x="280" y="499" width="414" height="48" fill="#17243A"/>
  <rect x="694" y="499" width="216" height="48" fill="#B68C3D"/>
  <rect x="910" y="499" width="90" height="48" fill="#934437"/>
  <text x="298" y="530" class="barText" fill="#F7F0DE">23  OPTIMAL</text>
  <text x="712" y="530" class="barText" fill="#FFF7E4">12  FEASIBLE</text>
  <text x="927" y="530" class="barText" fill="#FFF0EA">5</text>

  <!-- Legend -->
  <g transform="translate(280 576)">
    <rect width="14" height="14" fill="#17243A"/>
    <text x="26" y="13" class="sans" fill="#59677A" font-size="14">Certified optimal</text>
    <rect x="190" width="14" height="14" fill="#B68C3D"/>
    <text x="216" y="13" class="sans" fill="#59677A" font-size="14">Time limit · feasible incumbent</text>
    <rect x="488" width="14" height="14" fill="#934437"/>
    <text x="514" y="13" class="sans" fill="#59677A" font-size="14">Time limit · no incumbent</text>
  </g>

  <!-- Section 02: conditional runtime -->
  <text x="1064" y="320" class="section" fill="#8C6B2C">02  /  CONDITIONAL METRIC</text>
  <text x="1064" y="370" class="display" fill="#17243A" font-size="38" font-weight="700">Runtime</text>
  <text x="1064" y="402" class="body" fill="#59677A">Median among proved-optimal runs only</text>

  <g transform="translate(1064 438)">
    <text x="0" y="62" class="display tabular" fill="#17243A" font-size="72" font-weight="650">71<tspan class="sans" font-size="24" font-weight="650"> s</tspan></text>
    <text x="3" y="92" class="section" fill="#59677A" font-size="12">PROPOSED</text>
    <path d="M190 0V104" stroke="#B68C3D" stroke-width="2"/>
    <text x="230" y="62" class="display tabular" fill="#17243A" font-size="72" font-weight="650">94<tspan class="sans" font-size="24" font-weight="650"> s</tspan></text>
    <text x="233" y="92" class="section" fill="#59677A" font-size="12">BASELINE</text>
  </g>

  <g transform="translate(1064 560)">
    <rect width="424" height="44" fill="#DFD2B5"/>
    <path d="M0 0H6V44H0Z" fill="#B68C3D"/>
    <text x="20" y="18" class="sans" fill="#6B5223" font-size="12" font-weight="800" letter-spacing="1.5">SELECTION BOUNDARY</text>
    <text x="20" y="36" class="sans" fill="#4B493F" font-size="13">Timeouts excluded; not an all-run speedup.</text>
  </g>

  <!-- Section 03: claim boundary -->
  <text x="104" y="658" class="section" fill="#8C6B2C">03  /  CLAIM BOUNDARY</text>
  <text x="104" y="704" class="display" fill="#17243A" font-size="34" font-weight="700">The fixture does not establish these conclusions</text>
  <text x="104" y="735" class="body" fill="#59677A">Solver status is evidence; it is not a license to generalize.</text>

  <g transform="translate(104 770)">
    <circle cx="14" cy="14" r="14" fill="#934437"/>
    <path d="M8 8L20 20M20 8L8 20" stroke="#FFF0EA" stroke-width="2.5" stroke-linecap="round"/>
    <text x="42" y="9" class="sans" fill="#17243A" font-size="15" font-weight="800" letter-spacing="0.4">ALWAYS GLOBALLY OPTIMAL</text>
    <text x="42" y="31" class="sans" fill="#59677A" font-size="13.5">13 proposed runs lack an optimality certificate.</text>
  </g>
  <g transform="translate(576 770)">
    <circle cx="14" cy="14" r="14" fill="#934437"/>
    <path d="M8 8L20 20M20 8L8 20" stroke="#FFF0EA" stroke-width="2.5" stroke-linecap="round"/>
    <text x="42" y="9" class="sans" fill="#17243A" font-size="15" font-weight="800" letter-spacing="0.4">SCALABLE BEYOND 200 TASKS</text>
    <text x="42" y="31" class="sans" fill="#59677A" font-size="13.5">No larger instances or scaling analysis supplied.</text>
  </g>
  <g transform="translate(1088 770)">
    <circle cx="14" cy="14" r="14" fill="#934437"/>
    <path d="M8 8L20 20M20 8L8 20" stroke="#FFF0EA" stroke-width="2.5" stroke-linecap="round"/>
    <text x="42" y="9" class="sans" fill="#17243A" font-size="15" font-weight="800" letter-spacing="0.4">REAL-TIME READY</text>
    <text x="42" y="31" class="sans" fill="#59677A" font-size="13.5">No deadline, tail analysis, or deployment evidence.</text>
  </g>

  <!-- Editorial conclusion band -->
  <path d="M64 830H1536" stroke="#B48C42" stroke-width="2"/>
  <text x="76" y="878" class="eyebrow" fill="#C8AA61">OBSERVED DELTA</text>
  <text x="76" y="918" class="display" fill="#F6EFDD" font-size="25" font-weight="600">The baseline already scopes</text>
  <text x="76" y="950" class="display" fill="#F6EFDD" font-size="25" font-weight="600">the central claim.</text>

  <path d="M520 866V956" stroke="#34425A"/>
  <text x="560" y="878" class="eyebrow" fill="#C8AA61">SKILL OUTPUT ADDS</text>
  <text x="560" y="918" class="sans" fill="#F1E8D6" font-size="18" font-weight="650">Explicit failure reporting</text>
  <text x="560" y="948" class="sans" fill="#AAB5C7" font-size="18">Structured, actionable author queries</text>

  <path d="M1134 866V956" stroke="#34425A"/>
  <text x="1174" y="878" class="eyebrow" fill="#C8AA61">NEXT VALID TEST</text>
  <text x="1174" y="918" class="sans" fill="#F1E8D6" font-size="18" font-weight="650">Seal the skill snapshot.</text>
  <text x="1174" y="948" class="sans" fill="#AAB5C7" font-size="18">Replicate. Predefine scoring.</text>

  <!-- Folio -->
  <text x="1528" y="976" text-anchor="end" class="sans" fill="#6F7B8F" font-size="11" font-weight="650" letter-spacing="1.8">SYNTHETIC FIXTURE  ·  2026-07-14  ·  N = 40</text>
</svg>
